# deploy/docker-compose.yml — Smart Access Control runtime stack
#
# Services:
#   mosquitto      : MQTT broker (inter-service only, no host port exposed)
#   access-control : full pipeline (orchestrator + AI + GPIO + MQTT publish)
#
# Usage:
#   cd deploy/
#   IMAGE_TAG=latest docker compose up -d        # start
#   docker compose logs -f access-control        # follow logs
#   docker compose down                          # stop
#
# The IMAGE_TAG env var is set by deploy.sh to the exact SHA or semver tag.
# The :latest default lets you run the stack manually without deploy.sh.

services:

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  access-control:
    image: ghcr.io/lin0821-yanting/smartaccesscontrol:${IMAGE_TAG:-latest}
    runtime: nvidia
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - JETSON_TESTING_MODEL_NAME=JETSON_ORIN_NANO
    volumes:
      - engine-cache:/app/models/engines
      - /home/jetson/SmartAccessControl/data:/app/data
      - /home/jetson/SmartAccessControl/models/weights:/app/models/weights:ro
      - /home/jetson/.local/lib/python3.10/site-packages/onnxruntime:/usr/local/lib/python3.10/dist-packages/onnxruntime:ro
      - /home/jetson/SmartAccessControl/.venv/lib/python3.10/site-packages/gpiod.cpython-310-aarch64-linux-gnu.so:/usr/local/lib/python3.10/dist-packages/gpiod.cpython-310-aarch64-linux-gnu.so:ro
      - /usr/lib/aarch64-linux-gnu/libgpiod.so.2:/usr/lib/aarch64-linux-gnu/libgpiod.so.2:ro
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/usr/lib/aarch64-linux-gnu/gstreamer-1.0:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra:ro
      - /tmp/argus_socket:/tmp/argus_socket
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip1:/dev/gpiochip1
      - /dev/video0:/dev/video0
    restart: unless-stopped

volumes:
  mosquitto-data:
  engine-cache: