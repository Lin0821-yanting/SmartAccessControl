# deploy/mosquitto/mosquitto.conf
# Mosquitto MQTT broker configuration for the Smart Access Control compose stack.
#
# Design decisions:
#   - No host `ports:` mapping in docker-compose.yml — inter-service MQTT
#     uses Docker bridge DNS (access-control connects to "mosquitto:1883").
#     Add ports: ["1884:1883"] if you need external MQTT Explorer access.
#   - allow_anonymous true — no auth for lab environment.
#     Add password_file for production.
#   - persistence true — survives broker restarts without losing retained msgs.

listener 1883
allow_anonymous true

# Persistence: retained messages survive broker restart
persistence true
persistence_location /mosquitto/data/

# Logging to stdout so `docker compose logs mosquitto` shows broker events
log_dest stdout
log_type error
log_type warning
log_type notice
