# .github/workflows/ci.yml — five-stage CI pipeline
#
# Dependency graph (required by HW6 B / CAPSTONE B.4):
#
#   lint ──┬──▶ test ──────────────────────┐
#          │                               ├──▶ build ──▶ integration-test
#          └──▶ security-scan ─────────────┘
#
# Rules:
#   - lint/test/security-scan run on ubuntu-latest (cheap, no GPU)
#   - build     runs on ubuntu-latest with QEMU (ARM64 cross-compile)
#   - integration-test runs on the Jetson self-hosted runner (real hardware)
#   - integration-test only fires on main push (not on PRs) to protect runner

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

# ── Job 1: lint ────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: ruff format check
        run: ruff format --check .

      - name: ruff lint
        run: ruff check .

# ── Job 2: test (needs lint) ───────────────────────────────────────────────────
  test:
    name: Pytest + coverage ≥ 90%
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-cov \
            pytest-mock \
            "opencv-python==4.10.0.84" \
            "paho-mqtt==2.1.0" \
            gpiod \
            pyyaml

      - name: Run pytest with coverage gate
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

# ── Job 3: security-scan (needs lint, parallel with test) ─────────────────────
  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install security tools
        run: pip install "bandit>=1.7" pip-audit

      - name: bandit SAST
        run: bandit -r src -c pyproject.toml

      - name: Upgrade pip before audit
        run: pip install --upgrade pip

      - name: pip-audit dependency CVE scan
        run: |
          pip install \
            "paho-mqtt>=2.0" \
            "gpiod>=2.4.2" \
            pyyaml \
            2>/dev/null || true
          pip-audit --skip-editable

# ── Job 4: build (needs test + security-scan) ─────────────────────────────────
  build:
    name: Build & push ARM64 image → GHCR
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    # Only build/push on push events. On pull_request the GITHUB_TOKEN is
    # read-only for packages, so `docker push` to GHCR is denied; the push-event
    # run for the same commit already builds and pushes the image.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${REPO}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (ARM64 emulation on x86 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Verify image architecture
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ARCH=$(docker buildx imagetools inspect "$TAG" \
            --format '{{range .Manifest.Manifests}}{{.Platform.Architecture}} {{end}}')
          echo "Architectures in manifest: $ARCH"
          echo "$ARCH" | grep -q "arm64" || \
            { echo "ERROR: arm64 not found in manifest"; exit 1; }
          echo "PASS: arm64 architecture confirmed"

# ── Job 5: integration-test (needs build, main only, Jetson runner) ────────────
  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR on Jetson
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull the per-commit image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${REPO}:sha-${SHORT_SHA}"
          echo "Pulling $IMG"
          docker pull "$IMG"
          echo "IMAGE=$IMG" >> "$GITHUB_ENV"

      - name: Verify image is arm64
        run: |
          ARCH=$(docker inspect --format '{{.Architecture}}' "$IMAGE")
          echo "Image architecture: $ARCH"
          [ "$ARCH" = "arm64" ] || { echo "ERROR: wrong arch $ARCH"; exit 1; }

      - name: Install Python test dependencies
        run: |
          pip install \
            pytest \
            pytest-cov \
            pytest-mock \
            "opencv-python==4.10.0.84" \
            "paho-mqtt==2.1.0" \
            gpiod \
            pyyaml \
            --break-system-packages \
            --quiet

      - name: Run mock-based integration tests (IT-1 through IT-6)
        run: |
          python3 -m pytest tests/integration/ \
            -m "not hardware" \
            -v \
            --tb=short

      - name: Run hardware smoke tests (IT-7 — real GPIO)
        run: |
          python3 -m pytest tests/integration/ \
            -m hardware \
            -v \
            --tb=short
